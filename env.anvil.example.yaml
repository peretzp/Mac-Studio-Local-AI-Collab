# env.anvil.example.yaml — Template for Anvil (M3 Ultra)
#
# Use on Anvil: copy to env.local.yaml (or env.yaml in a clone of this repo)
# and fill in real hostname, user, IPs. No secrets in this file.
#
# Primary machine (M2 Max) runs: dashboard, API, prompt-browser, Cursor, Claude Code.
# Anvil runs: inference only (Ollama, vllm-mlx). See ~/.claude/ANVIL-SETUP-PLAN.md

machine:
  name: "Anvil"
  hostname: "anvil.local"
  user: "peretz"
  os: "macOS 26.2 (updating to latest)"
  arch: "arm64 (M3 Ultra, 28c CPU, 60c GPU, Metal 4)"
  ram: "96GB unified (819 GB/s bandwidth)"
  ssd: "3.6TB"
  lan_ip: "192.168.1.105"  # DHCP reservation set in Ubiquiti
  # tailscale_ip: TBD       # after `tailscale up`

runtimes:
  python: "3.11"
  node: "v24.x"       # optional on Anvil; install if needed for scripts
  shell: "zsh"

paths:
  home: "/Users/peretz_1"   # or your Anvil $HOME
  # No vault on Anvil unless you add a mirror (see ANVIL-MULTI-AGENT)
  # claude_config, codex_config: only if you run Claude Code on Anvil later

# Services that RUN ON ANVIL (inference only)
services:
  ollama:
    port: 11434
    url: "http://localhost:11434"
    health: "http://localhost:11434/api/tags"

  vllm_mlx_35b:
    port: 8001
    url: "http://localhost:8001/v1"
    note: "Qwen3.5-35B-A3B — primary chat"

  vllm_mlx_coder:
    port: 8002
    url: "http://localhost:8002/v1"
    note: "Qwen3-Coder-30B-A3B"

  vllm_mlx_8b:
    port: 8003
    url: "http://localhost:8003/v1"
    note: "Qwen3 8B — fast"

  # open_webui:
  #   port: 8080
  #   url: "http://localhost:8080"
  #   note: "Optional — human chat UI to all models"

# These run on M2 Max, NOT on Anvil (for reference only)
# dashboard: :3000, api: :3001, prompt_browser: :3002, contact_verify: :3003
# cost_tracker: :3004, langfuse: :3005, litellm: :4000

network:
  tailscale: true     # Anvil joins Tailscale mesh (5th device: Mac Studio, NAS, iPad, iPhone, Anvil)
  lan_ip: "192.168.1.105"
  lan_dns: "anvil.local"  # set via Ubiquiti Local DNS Record
  ssh: "ssh anvil"        # configured in ~/.ssh/config on Hearth (M2 Max)
  link: "GbE (10GbE switch pending — QNAP QSW-3205-5T in Amazon cart)"

# Companion machine
hearth:
  name: "Hearth"           # M2 Max, daily driver
  lan_ip: "192.168.1.113"
  services: "dashboard:3000, api:3001, prompt-browser:3002, contact-verify:3003, litellm:4000"
